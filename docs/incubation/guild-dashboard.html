<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Guild Blackboard</title>
  <style>
    :root {
      --nav: #151725;
      --nav-2: #20243a;
      --glass: rgba(21, 31, 48, 0.76);
      --glass-2: rgba(14, 20, 33, 0.72);
      --card: #fffdf8;
      --ink: #202027;
      --muted: #6d7280;
      --line: rgba(255, 255, 255, 0.18);
      --line-dark: #e3e0d8;
      --ready: #f2b632;
      --claimed: #7c8cff;
      --blocked: #ef5b4c;
      --done: #2fb47c;
      --accent: #ee2b74;
      --blue: #1168b4;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      --card-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
      --mono: ui-monospace, "Cascadia Mono", Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: #f7f8fb;
      font-family: var(--sans);
      background:
        linear-gradient(90deg, rgba(13, 23, 38, 0.28) 0 8px, transparent 8px 92px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 2px, transparent 2px 118px),
        linear-gradient(135deg, #0d4b8d 0%, #1576c9 38%, #10213e 100%);
      overflow: auto;
    }

    button,
    .file-label {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      font: 700 0.78rem var(--mono);
      cursor: pointer;
    }

    button:hover,
    .file-label:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    input[type="file"] { display: none; }

    .app {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      grid-template-rows: 56px 52px auto minmax(0, 1fr);
      min-height: 100vh;
    }

    .brand {
      grid-column: 1;
      grid-row: 1;
      display: grid;
      place-items: center;
      background: var(--accent);
      font-size: 1.3rem;
      font-weight: 900;
    }

    .topbar {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
      padding: 0 22px;
      background: rgba(8, 13, 26, 0.86);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.22);
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 9px;
      height: 64px;
      padding: 0 16px;
      color: rgba(255, 255, 255, 0.76);
      font-weight: 800;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
    }

    .tab.active {
      color: #fff;
      border-color: #fff;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.18);
      font: 900 0.72rem var(--mono);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: fit-content;
    }

    .sidebar {
      grid-column: 1;
      grid-row: 2 / 4;
      background: rgba(17, 18, 31, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      padding-top: 32px;
    }

    .side-item {
      width: 52px;
      min-height: 56px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.42);
      font: 800 0.68rem var(--mono);
      text-align: center;
    }

    .side-item.active { color: #fff; }

    .subbar {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
      padding: 0 24px;
      background: rgba(17, 47, 90, 0.84);
      backdrop-filter: blur(14px);
    }

    .board-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
      font-weight: 900;
    }

    .board-title span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .count-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.82);
      font: 800 0.78rem var(--mono);
      white-space: nowrap;
    }

    .avatars {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: fit-content;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      color: var(--ink);
      border: 2px solid rgba(255, 255, 255, 0.55);
      font: 900 0.72rem var(--mono);
    }

    .avatar.accent {
      background: var(--accent);
      color: #fff;
    }

    .avatar.live {
      box-shadow: 0 0 0 3px rgba(47, 180, 124, 0.28);
    }

    .board {
      grid-column: 2;
      grid-row: 4;
      min-width: 0;
      min-height: 0;
      overflow: visible;
      padding: 14px 18px 28px;
    }

    .quest-panel {
      grid-column: 2;
      grid-row: 3;
      display: grid;
      grid-template-columns: minmax(360px, 1.25fr) minmax(280px, 0.75fr);
      gap: 10px;
      padding: 10px 18px 0;
      background: rgba(12, 23, 42, 0.62);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .quest-form,
    .hermes-log,
    .provider-lab {
      min-width: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 13, 26, 0.72);
      padding: 10px;
    }

    .quest-grid {
      display: grid;
      grid-template-columns: 1fr 140px 140px;
      gap: 8px;
    }

    .quest-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .quest-field.wide { grid-column: 1 / -1; }

    .quest-field label,
    .hermes-log-title {
      color: rgba(255, 255, 255, 0.76);
      font: 800 0.68rem var(--mono);
      text-transform: uppercase;
    }

    .quest-field input,
    .quest-field select,
    .quest-field textarea {
      width: 100%;
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: 0.78rem var(--mono);
    }

    .quest-field textarea {
      min-height: 46px;
      resize: vertical;
    }

    #questRequest {
      min-height: 132px;
    }

    .quest-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .side-stack {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .hermes-log {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 116px;
    }

    .event-log,
    .meeting-rounds {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 92px;
    }

    .hermes-lines {
      display: grid;
      gap: 6px;
      max-height: 94px;
      overflow: auto;
      color: rgba(255, 255, 255, 0.82);
      font: 0.75rem var(--mono);
    }

    .hermes-line {
      padding-left: 10px;
      border-left: 3px solid rgba(47, 180, 124, 0.8);
    }

    .event-line {
      padding-left: 10px;
      border-left: 3px solid rgba(242, 182, 50, 0.9);
    }

    .meeting-line {
      padding-left: 10px;
      border-left: 3px solid rgba(124, 140, 255, 0.9);
    }

    .provider-lab {
      display: grid;
      gap: 8px;
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .provider-grid .wide {
      grid-column: 1 / -1;
    }

    .provider-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .provider-status {
      min-height: 22px;
      color: rgba(255, 255, 255, 0.82);
      font: 0.72rem var(--mono);
      overflow-wrap: anywhere;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(270px, 1fr));
      gap: 18px;
      min-width: 1120px;
      align-items: start;
    }

    .column {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      background: var(--glass);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 8px;
    }

    .column-name {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-size: 1.1rem;
      font-weight: 900;
    }

    .dot {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.72);
      background: var(--ready);
    }

    .column.claimed .dot { background: var(--claimed); }
    .column.blocked .dot { background: var(--blocked); }
    .column.done .dot { background: var(--done); }

    .column-count {
      min-width: 30px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font: 900 0.72rem var(--mono);
    }

    .lane {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .task-card {
      min-height: 138px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: 7px;
      background: var(--card);
      color: var(--ink);
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255, 255, 255, 0.68);
      animation: rise 280ms ease both;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .task-title {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.22;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .rank {
      min-width: 32px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #1d2234;
      color: #fff;
      font: 900 0.75rem var(--mono);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font: 800 0.72rem var(--mono);
    }

    .hold-meter {
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7e4dd;
    }

    .hold-bar {
      width: var(--hold, 0%);
      height: 100%;
      border-radius: inherit;
      background: var(--ready);
    }

    .claimed .hold-bar,
    .running .hold-bar { background: var(--claimed); }
    .blocked .hold-bar { background: var(--blocked); }
    .done .hold-bar { background: var(--done); }

    .tag {
      max-width: 100%;
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 8px;
      background: #ece8df;
      color: #4d5360;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag.hot {
      background: #1d2234;
      color: #fff;
    }

    .tag.warn {
      background: #fee4df;
      color: #9c2418;
    }

    .tag.good {
      background: #dcf7ea;
      color: #176b45;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
    }

    .task-id {
      color: var(--muted);
      font: 800 0.68rem var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .mini-avatar {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      color: #fff;
      background: var(--accent);
      font: 900 0.66rem var(--mono);
    }

    .empty {
      min-height: 118px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.58);
      font: 800 0.76rem var(--mono);
    }

    .drawer {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: min(560px, calc(100vw - 44px));
      max-height: min(460px, calc(100vh - 44px));
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(12, 17, 29, 0.95);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      z-index: 5;
    }

    .drawer.open { display: flex; }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-weight: 900;
    }

    textarea {
      width: 100%;
      min-height: 250px;
      resize: vertical;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font: 0.78rem var(--mono);
    }

    @keyframes rise {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .brand,
      .sidebar { display: none; }
      .topbar,
      .subbar,
      .board {
        grid-column: 1;
      }
      .topbar {
        grid-row: 1;
        min-height: 64px;
        align-items: stretch;
        flex-direction: column;
        padding: 10px;
      }
      .tabs {
        width: 100%;
        overflow-x: auto;
      }
      .tab { height: 38px; }
      .actions {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
      }
      .subbar {
        grid-row: 2;
        min-height: 68px;
        align-items: start;
        flex-direction: column;
        padding: 12px;
      }
      .avatars { display: none; }
      .board {
        grid-row: 4;
        padding: 14px;
        overflow: visible;
      }
      .quest-panel {
        grid-column: 1;
        grid-row: 3;
        grid-template-columns: 1fr;
        padding: 12px;
      }
      .quest-grid,
      .provider-grid {
        grid-template-columns: 1fr;
      }
      .columns {
        min-width: 0;
        grid-template-columns: 1fr;
      }
      .column {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="brand">G</div>

    <nav class="topbar">
      <div class="tabs" aria-label="Guild navigation">
        <div class="tab"><span class="icon">P</span>Projects</div>
        <div class="tab active"><span class="icon">B</span>Blackboard</div>
        <div class="tab"><span class="icon">T</span>Team</div>
        <div class="tab"><span class="icon">A</span>Artifacts</div>
      </div>
      <div class="actions">
        <label class="file-label" for="fileInput">Load JSON</label>
        <input id="fileInput" type="file" accept="application/json,.json">
        <button id="sampleButton" type="button">Demo</button>
        <button id="clearButton" type="button">Clear Output</button>
        <button id="refreshButton" type="button">Refresh</button>
        <button id="autoButton" type="button" aria-pressed="false">Auto Off</button>
        <button id="pasteToggle" type="button">JSON</button>
      </div>
    </nav>

    <aside class="sidebar" aria-label="Guild sections">
      <div class="side-item">Guild</div>
      <div class="side-item active">Board</div>
      <div class="side-item">Tasks</div>
      <div class="side-item">Agents</div>
      <div class="side-item">Logs</div>
    </aside>

    <section class="subbar">
      <div class="board-title">
        <span class="icon">Q</span>
        <span id="boardName">Guild Blackboard</span>
        <span class="count-strip"><span id="taskCount">0</span> tasks</span>
        <span class="count-strip"><span id="artifactCount">0</span> artifacts</span>
      </div>
      <div class="avatars" id="agentStrip"></div>
    </section>

    <section class="quest-panel" aria-label="Assign quest">
      <form class="quest-form" id="questForm">
        <div class="quest-grid">
          <div class="quest-field">
            <label for="questTitle">Task</label>
            <input id="questTitle" value="Manual dashboard task">
          </div>
          <div class="quest-field">
            <label for="questAdapter">Adapter</label>
            <select id="questAdapter">
              <option value="auto-rank" selected>auto-rank</option>
              <option value="auto-ammo">auto-ammo</option>
              <option value="local-dry-run">local-dry-run</option>
              <option value="local-file-writer">local-file-writer</option>
              <option value="opencode">opencode</option>
              <option value="gemini">gemini</option>
              <option value="groq">groq</option>
              <option value="openrouter">openrouter</option>
            </select>
          </div>
          <div class="quest-field">
            <label for="questId">Quest ID</label>
            <input id="questId" placeholder="auto">
          </div>
          <div class="quest-field wide">
            <label for="questRequest">Prompt for Hermes</label>
            <textarea id="questRequest">Build a tiny scoped demo change and publish evidence.</textarea>
          </div>
          <div class="quest-field wide">
            <label for="questAllowed">Allowed files</label>
            <input id="questAllowed" placeholder="docs/incubation/*, scripts/*">
          </div>
        </div>
        <div class="quest-actions">
          <button id="assignQuest" type="submit">Giao Task Cho Hermes</button>
        </div>
      </form>
      <div class="side-stack">
        <section class="hermes-log" aria-label="Hermes routing log">
          <div class="hermes-log-title">Hermes Routing Log</div>
          <div class="hermes-lines" id="hermesLines">
            <div class="hermes-line">Waiting for a task.</div>
          </div>
        </section>
        <section class="event-log" aria-label="Guild event log">
          <div class="hermes-log-title">Guild Event Log</div>
          <div class="hermes-lines" id="eventLines">
            <div class="event-line">No events yet.</div>
          </div>
        </section>
        <section class="meeting-rounds" aria-label="Meeting rounds">
          <div class="hermes-log-title">Meeting Rounds</div>
          <div class="hermes-lines" id="meetingLines">
            <div class="meeting-line">No meeting round yet.</div>
          </div>
        </section>
        <section class="provider-lab" aria-label="Provider lab">
          <div class="hermes-log-title">Provider Lab</div>
          <div class="provider-grid">
            <div class="quest-field">
              <label for="providerTransport">Transport</label>
              <select id="providerTransport"></select>
            </div>
            <div class="quest-field">
              <label for="providerCapability">Gun</label>
              <select id="providerCapability"></select>
            </div>
            <div class="quest-field">
              <label for="providerSecretKey">Key</label>
              <select id="providerSecretKey"></select>
            </div>
            <div class="quest-field">
              <label for="providerSecretValue">Secret</label>
              <input id="providerSecretValue" type="password" autocomplete="off" placeholder="paste key">
            </div>
            <div class="quest-field wide">
              <label for="providerCartridge">Ammo / Model</label>
              <select id="providerCartridge"></select>
            </div>
            <div class="quest-field wide">
              <label for="providerModel">Override model</label>
              <input id="providerModel" placeholder="optional exact model id">
            </div>
          </div>
          <div class="provider-actions">
            <button id="saveProviderKey" type="button">Save Key</button>
            <button id="refreshProviderModels" type="button">List Models</button>
            <button id="testProviderNow" type="button">Test Now</button>
          </div>
          <div class="provider-status" id="providerStatus">Loading providers...</div>
        </section>
      </div>
    </section>

    <section class="board" aria-label="Task board">
      <div class="columns" id="columns"></div>
    </section>
  </main>

  <section class="drawer" id="jsonDrawer" aria-label="Dashboard JSON">
    <div class="drawer-head">
      <span>Dashboard JSON</span>
      <div class="actions">
        <button id="renderPaste" type="button">Render</button>
        <button id="closeDrawer" type="button">Close</button>
      </div>
    </div>
    <textarea id="jsonInput" spellcheck="false"></textarea>
  </section>

  <script>
    const sample = {
      schema_version: "guild_dashboard_read_v0",
      task_count: 5,
      artifact_count: 0,
      status_counts: { done: 1, open: 2, blocked: 2 },
      type_counts: { contract: 1, execution: 3, join_review: 1 },
      chains: [{
        quest_chain_id: "demo-even-random-app",
        task_count: 5,
        status_counts: { done: 1, open: 2, blocked: 2 },
        next_open_tasks: [
          { task_id: "demo-even-app-logic", title: "Build random even number logic", required_rank: "C", required_skill: "app_logic" },
          { task_id: "demo-even-ui", title: "Design simple button UI", required_rank: "C", required_skill: "ui" }
        ],
        blocked_review_tasks: []
      }],
      tasks: [
        { sequence_no: 1, task_id: "demo-even-spec", title: "Spec random even app", status: "done", assignee_id: null, output_artifact: "app_spec", owner_area: "product", plan_review_status: "not_required", task_type: "contract", required_rank: "C", required_skill: "planning", quest_chain_id: "demo-even-random-app", block_reason: null },
        { sequence_no: 2, task_id: "demo-even-app-logic", title: "Build random even number logic", status: "open", assignee_id: null, output_artifact: "app_logic_result", owner_area: "frontend_logic", plan_review_status: "approved", task_type: "execution", required_rank: "C", required_skill: "app_logic", quest_chain_id: "demo-even-random-app", block_reason: null },
        { sequence_no: 3, task_id: "demo-even-ui", title: "Design simple button UI", status: "open", assignee_id: null, output_artifact: "ui_result", owner_area: "frontend_ui", plan_review_status: "approved", task_type: "execution", required_rank: "C", required_skill: "ui", quest_chain_id: "demo-even-random-app", block_reason: null },

        { sequence_no: 5, task_id: "demo-even-join-review", title: "Review app UI test integration", status: "blocked", assignee_id: null, output_artifact: "integration_report", owner_area: "review", plan_review_status: "approved", task_type: "join_review", required_rank: "B", required_skill: "integration_review", quest_chain_id: "demo-even-random-app", block_reason: "waiting_dependencies:demo-even-app-logic:open,demo-even-ui:open,demo-even-tester:blocked" }

    const agentRoster = [
      { id: "hermes-codex", label: "Hermes", skills: ["planning", "review", "orchestration"] },

    ];

    const columnDefs = [
      { id: "ready", title: "Ready", status: "open", empty: "No ready tasks" },
      { id: "claimed", title: "Claimed", status: "claimed", alt: ["running"], empty: "No claimed tasks" },

    let activeQuestChainId = null;
    let finalizeInFlight = false;
    let providerLabConfig = null;

    const el = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));

    function emptyDashboard() {
      return {
        schema_version: "guild_dashboard_read_v0",

        artifact_count: 0,
        status_counts: {},

    function questIdFromTitle(title) {
      const slug = String(title || "guild-demo")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 36) || "guild-demo";
      const stamp = new Date()
        .toISOString()
        .replace(/[-:TZ.]/g, "")
        .slice(0, 14);
      return `quest-${slug}-${stamp}`;
    }

    function logHermes(lines) {
      const items = Array.isArray(lines) ? lines : [lines];
      el("hermesLines").innerHTML = items
        .filter(Boolean)
        .map((line) => `<div class="hermes-line">${escapeHtml(line)}</div>`)
        .join("");
    }

    function renderLineList(elementId, lines, className, emptyText) {
      const items = Array.isArray(lines) ? lines.filter(Boolean) : [];
      el(elementId).innerHTML = (items.length ? items : [emptyText])
        .map((line) => `<div class="${className}">${escapeHtml(line)}</div>`)
        .join("");
    }

    function taskShort(task) {
      return task.title || task.task_id || "task";
    }

    function buildEventLog(data) {
      const tasks = Array.isArray(data.tasks) ? data.tasks : [];
      const artifacts = Array.isArray(data.artifacts) ? data.artifacts : [];
      const events = [];
      if (data.filters && data.filters.quest_chain_id) {
        events.push(`Hermes planned quest ${data.filters.quest_chain_id}.`);
      }
      const created = tasks.length;
      if (created) events.push(`Tasks created: ${created}.`);
      const claimed = tasks.filter((task) => ["claimed", "running"].includes(String(task.status || "")));
      claimed.forEach((task) => events.push(`Worker claimed: ${task.assignee_id || "agent"} -> ${taskShort(task)}.`));
      artifacts.slice(-6).forEach((artifact) => {
        events.push(`Artifact published: ${artifact.artifact_type || "artifact"} from ${artifact.producer_agent_id || artifact.task_id}.`);
      });
      const fixes = tasks.filter((task) => String(task.task_type || "") === "fix");
      if (fixes.length) events.push(`Meeting created fix tasks: ${fixes.map((task) => task.task_id).join(" / ")}.`);
      const finalArtifact = artifacts.find((artifact) => String(artifact.summary || "").includes("hermes_finalized"));
      if (finalArtifact) events.push("Final assembly done and durable artifact published.");
      return events;
    }

    function buildMeetingRounds(data) {
      const tasks = Array.isArray(data.tasks) ? data.tasks : [];
      const artifacts = Array.isArray(data.artifacts) ? data.artifacts : [];
      const review = tasks.find((task) => String(task.task_type || "") === "join_review");
      const fixes = tasks
        .filter((task) => String(task.task_type || "") === "fix")
        .sort((a, b) => Number(a.fix_round || 0) - Number(b.fix_round || 0));
      const lines = [];
      if (review) {
        lines.push(`Round 0: review ${review.status}; deps ${Array.isArray(review.depends_on) ? review.depends_on.length : 0}.`);
      }
      fixes.forEach((task) => {
        const round = task.fix_round || "?";
        lines.push(`Round ${round}: ${task.required_skill || "module"} fix ${task.status} (${task.generated_from || task.task_id}).`);
      });
      const finalArtifact = artifacts.find((artifact) => String(artifact.summary || "").includes("hermes_finalized"));
      if (finalArtifact) lines.push("Final round: review accepted and final assembly artifact recorded.");
      return lines;
    }

    function setProviderStatus(message) {
      el("providerStatus").textContent = message;
    }

    function selectedTransport() {
      return el("providerTransport").value;
    }

    function renderProviderLab() {
      if (!providerLabConfig) return;
      const transports = providerLabConfig.transports || {};
      const capabilities = providerLabConfig.capabilities || {};
      const transportNames = Object.keys(transports);
      el("providerTransport").innerHTML = transportNames
        .map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
        .join("");
      const capabilityNames = Object.keys(capabilities);
      el("providerCapability").innerHTML = capabilityNames
        .map((name) => `<option value="${escapeHtml(name)}" ${name === "deterministic-smoke" ? "selected" : ""}>${escapeHtml(name)}</option>`)
        .join("");
      if (transports["openrouter-http"]) el("providerTransport").value = "openrouter-http";
      updateProviderChoices();
    }

    function updateProviderChoices() {
      if (!providerLabConfig) return;
      const transportName = selectedTransport();
      const transport = (providerLabConfig.transports || {})[transportName] || {};
      const envKeys = transport.env_keys || [];
      const secretStatus = providerLabConfig.secret_status || {};
      el("providerSecretKey").innerHTML = envKeys.length
        ? envKeys.map((key) => {
            const status = secretStatus[key];
            const suffix = status && status.has_key ? ` (${status.source})` : " (missing)";
            return `<option value="${escapeHtml(key)}">${escapeHtml(key + suffix)}</option>`;
          }).join("")
        : `<option value="">no key needed</option>`;
      const cartridges = providerLabConfig.cartridges || {};
      const options = Object.entries(cartridges)
        .filter(([, cartridge]) => String(cartridge.transport || "") === transportName)
        .map(([name, cartridge]) => {
          const model = cartridge.model ? ` / ${cartridge.model}` : "";
          return `<option value="${escapeHtml(name)}" data-model="${escapeHtml(cartridge.model || "")}">${escapeHtml(name + model)}</option>`;
        });
      el("providerCartridge").innerHTML = options.length
        ? options.join("")
        : `<option value="${escapeHtml(transportName)}">${escapeHtml(transportName)}</option>`;
      const selected = el("providerCartridge").selectedOptions[0];
      el("providerModel").value = selected ? (selected.dataset.model || "") : "";
      const keyLine = envKeys.length
        ? envKeys.map((key) => {
            const status = secretStatus[key];
            return `${key}:${status && status.has_key ? status.source : "missing"}`;
          }).join(" / ")
        : "no key";
      setProviderStatus(`${transportName} ready. ${keyLine}`);
    }

    async function loadProviderLab() {
      try {
        const response = await fetch("/api/provider-lab/config", { cache: "no-store" });
        const value = await response.json();
        if (!value.ok) throw new Error(value.error || "provider config failed");
        providerLabConfig = value;
        renderProviderLab();
      } catch (error) {
        setProviderStatus(`Provider Lab unavailable: ${error.message}`);
      }
    }

    function initials(value) {
      const text = String(value || "guild").replace(/[^a-zA-Z0-9]+/g, " ").trim();
      if (!text) return "G";
      return text.split(" ").slice(0, 2).map((part) => part[0]).join("").toUpperCase();
    }

    function parseDate(value) {
      const date = value ? new Date(value) : null;
      return date && !Number.isNaN(date.getTime()) ? date : null;
    }

    function holdPercent(task) {
      const status = String(task.status || "").toLowerCase();
      if (status === "done") return 100;
      if (status === "blocked") return 100;
      if (status !== "claimed" && status !== "running") return 0;
      const claimedAt = parseDate(task.claimed_at);
      const leaseUntil = parseDate(task.lease_until);
      if (!claimedAt || !leaseUntil || leaseUntil <= claimedAt) return 8;
      const elapsed = Date.now() - claimedAt.getTime();
      const total = leaseUntil.getTime() - claimedAt.getTime();
      return Math.max(8, Math.min(100, Math.round((elapsed / total) * 100)));
    }

    function ageLabel(task) {
      const status = String(task.status || "").toLowerCase();
      if (status !== "claimed" && status !== "running") return status;
      const claimedAt = parseDate(task.claimed_at);
      if (!claimedAt) return "held ?";
      const seconds = Math.max(0, Math.floor((Date.now() - claimedAt.getTime()) / 1000));
      if (seconds < 60) return `held ${seconds}s`;
      const minutes = Math.floor(seconds / 60);
      return `held ${minutes}m`;
    }

    function blockLabel(task) {
      const reason = String(task.block_reason || task.persistent_blocked_reason || "");
      if (!reason) return null;
      if (reason === "plan_review_pending") return "plan gate";
      if (reason === "human_approval_required") return "human gate";
      if (reason === "needs_info") return "needs info";
      if (reason.startsWith("waiting_dependencies")) return "waiting deps";
      return reason.replace(/_/g, " ");
    }

    function groupTasks(tasks) {
      return columnDefs.reduce((acc, column) => {
        acc[column.id] = tasks.filter((task) => {
          const status = String(task.status || "").toLowerCase();
          return status === column.status || (column.alt || []).includes(status);
        });
        return acc;
      }, {});
    }

    function renderCard(task, index, artifactsByTask) {
      const status = String(task.status || "unknown").toLowerCase();
      const owner = task.assignee_id || task.owner_area || task.required_skill || "guild";
      const hold = holdPercent(task);
      const artifacts = artifactsByTask.get(task.task_id) || [];
      const hasEvidence = artifacts.length > 0;
      const meta = [
        task.task_type || "task",
        task.required_rank ? `rank ${task.required_rank}` : null,
        task.required_skill || null,
        task.generated_from ? "generated" : null,
        task.human_approval_required ? "human gate" : null
      ].filter(Boolean);
      const review = task.plan_review_status ? `plan:${task.plan_review_status}` : "plan:-";
      const artifact = task.output_artifact ? `artifact ${task.output_artifact}` : "artifact -";
      const block = blockLabel(task);
      const tags = meta.map((item, tagIndex) => `<span class="tag ${tagIndex === 0 ? "hot" : ""}">${escapeHtml(item)}</span>`).join("");

      return `
        <article class="task-card ${escapeHtml(status)}" style="--hold: ${hold}%; animation-delay: ${index * 35}ms">
          <div class="card-top">
            <h3 class="task-title">${escapeHtml(task.title || task.task_id || "Untitled task")}</h3>
            <div class="rank">${escapeHtml(task.required_rank || "-")}</div>
          </div>
          <div class="meta-row">
            ${tags}
          </div>
          <div class="hold-meter" title="${escapeHtml(ageLabel(task))}"><div class="hold-bar"></div></div>
          <div class="meta-row">
            <span class="tag">${escapeHtml(ageLabel(task))}</span>
            <span class="tag">${escapeHtml(review)}</span>
            ${block ? `<span class="tag warn">${escapeHtml(block)}</span>` : ""}
            ${hasEvidence ? `<span class="tag good">${artifacts.length} artifact${artifacts.length === 1 ? "" : "s"}</span>` : ""}
            <span>${escapeHtml(artifact)}</span>
          </div>
          <div class="card-foot">
            <div class="task-id">#${escapeHtml(task.sequence_no || "?")} ${escapeHtml(task.task_id || "")}</div>
            <div class="mini-avatar" title="${escapeHtml(owner)}">${escapeHtml(initials(owner))}</div>
          </div>
        </article>
      `;
    }

    function renderAgents(tasks) {
      const liveAgents = new Set(tasks
        .filter((task) => ["claimed", "running"].includes(String(task.status || "").toLowerCase()))
        .map((task) => task.assignee_id)
        .filter(Boolean));
      el("agentStrip").innerHTML = agentRoster.map((agent, index) => {
        const active = liveAgents.has(agent.id);
        const title = `${agent.label} / ${agent.skills.join(", ")}`;
        return `<div class="avatar ${index === 0 ? "accent" : ""} ${active ? "live" : ""}" title="${escapeHtml(title)}">${escapeHtml(initials(agent.label))}</div>`;
      }).join("");
    }

    function boardName(data) {
      const filter = data.filters && data.filters.quest_chain_id;
      const chain = Array.isArray(data.chains) && data.chains.length === 1 ? data.chains[0].quest_chain_id : null;
      return filter || chain || "Guild Blackboard";
    }

    function render(data) {
      const tasks = Array.isArray(data.tasks) ? data.tasks : [];
      const chains = Array.isArray(data.chains) ? data.chains : [];
      const artifacts = Array.isArray(data.artifacts) ? data.artifacts : [];
      const artifactsByTask = artifacts.reduce((map, artifact) => {
        const taskId = artifact && artifact.task_id;
        if (!taskId) return map;
        if (!map.has(taskId)) map.set(taskId, []);
        map.get(taskId).push(artifact);
        return map;
      }, new Map());
      const grouped = groupTasks(tasks);
      activeQuestChainId = boardName(data);

      el("taskCount").textContent = data.task_count ?? tasks.length;
      el("artifactCount").textContent = data.artifact_count ?? (Array.isArray(data.artifacts) ? data.artifacts.length : 0);
      el("boardName").textContent = boardName(data);
      renderAgents(tasks);
      renderLineList("eventLines", buildEventLog(data), "event-line", "No events yet.");
      renderLineList("meetingLines", buildMeetingRounds(data), "meeting-line", "No meeting round yet.");

      el("columns").innerHTML = columnDefs.map((column) => {
        const columnTasks = grouped[column.id] || [];
        const cards = columnTasks.length
          ? columnTasks.map((task, index) => renderCard(task, index, artifactsByTask)).join("")
          : `<div class="empty">${column.empty}</div>`;
        return `
          <section class="column ${column.id}">
            <div class="column-header">
              <div class="column-name"><span class="dot"></span><span>${column.title}</span></div>
              <div class="column-count">${columnTasks.length}</div>
            </div>
            <div class="lane">${cards}</div>
          </section>
        `;
      }).join("");
      maybeFinalizeWithHermes(data);
    }

    async function maybeFinalizeWithHermes(data) {
      if (finalizeInFlight || !activeQuestChainId) return;
      const tasks = Array.isArray(data.tasks) ? data.tasks : [];
      const buildTasks = tasks.filter((task) => String(task.task_id || "").match(/-build-\d+$/));
      const reviewTask = tasks.find((task) => String(task.task_type || "") === "join_review");
      if (!buildTasks.length || !reviewTask) return;
      if (reviewTask.status === "done") return;
      const terminalStatuses = new Set(["done", "failed", "cancelled"]);
      if (!buildTasks.every((task) => terminalStatuses.has(task.status))) return;
      finalizeInFlight = true;
      const failedBuilds = buildTasks.filter((task) => task.status !== "done");
      logHermes(failedBuilds.length
        ? [
            "Hermes meeting detected a failed module.",
            "Creating bounded repair tasks for the responsible worker.",
            "Review will wait for repair artifacts."
          ]
        : [
            "Three worker outputs detected.",
            "Hermes is checking the quest workspace.",
            "Writing review.md and final-summary.md..."
          ]);
      try {
        const response = await fetch("/api/hermes/finalize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ quest_chain_id: activeQuestChainId })
        });
        const value = await response.json();
        if (value.ok && value.dashboard) {
          if (value.ready === false && value.repair) {
            logHermes([
              "Hermes meeting queued repair work.",
              `Created fixes: ${(value.repair.created || []).join(" / ") || "none"}`,
              `Waiting fixes: ${(value.repair.waiting || []).join(" / ") || "none"}`
            ]);
            render(value.dashboard);
            return;
          }
          const telegramLine = value.telegram && value.telegram.ok
            ? (value.telegram.queued ? "Telegram report queued." : "Telegram report sent.")
            : `Telegram report skipped/failed: ${value.telegram?.reason || "unknown"}`;
          logHermes([
            "Hermes final check completed.",
            `Files: ${(value.files || []).join(" / ")}`,
            "Blackboard review task marked done.",
            telegramLine
          ]);
          render(value.dashboard);
        }
      } catch (_error) {
        // Auto-refresh will try again on the next board update.
      } finally {
        finalizeInFlight = false;
      }
    }

    el("clearButton").addEventListener("click", () => {

      finalizeInFlight = false;

      logHermes(["Output cleared. Ready for a fresh Hermes quest."]);
      renderLineList("eventLines", [], "event-line", "No events yet.");
      renderLineList("meetingLines", [], "meeting-line", "No meeting round yet.");
      const data = emptyDashboard();

      const file = event.target.files[0];
      if (!file) return;
      const data = JSON.parse(await file.text());
      el("jsonInput").value = JSON.stringify(data, null, 2);
      render(data);
    });

    async function loadDefaultDashboard({ fallbackToSample = true } = {}) {
      if (activeQuestChainId) {
        try {
          const response = await fetch(`/api/dashboard?quest_chain_id=${encodeURIComponent(activeQuestChainId)}`, { cache: "no-store" });
          if (response.ok) {
            const value = await response.json();
            if (value.ok && value.dashboard) {
              el("jsonInput").value = JSON.stringify(value.dashboard, null, 2);
              render(value.dashboard);
              return true;
            }
          }
        } catch (_error) {
          // Static mode falls back to JSON file fetch below.
        }
      }

      const paths = [
        "/_runtime/dashboard/guild-dashboard.json",
        "../../_runtime/dashboard/guild-dashboard.json"
      ];
      for (const path of paths) {
        try {
          const response = await fetch(path, { cache: "no-store" });
          if (!response.ok) continue;
          const data = await response.json();
          el("jsonInput").value = JSON.stringify(data, null, 2);
          render(data);
          return true;
        } catch (_error) {
          // Local file:// pages cannot fetch sibling JSON. The launcher script
          // starts a tiny HTTP server so this path works without manual loading.
        }
      }
      if (fallbackToSample) {
        el("jsonInput").value = JSON.stringify(sample, null, 2);
        render(sample);
      }
      return false;
    }

    function setAutoRefresh(enabled) {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
      el("autoButton").setAttribute("aria-pressed", enabled ? "true" : "false");
      el("autoButton").textContent = enabled ? "Auto On" : "Auto Off";
      if (enabled) {
        autoRefreshTimer = setInterval(() => {
          loadDefaultDashboard({ fallbackToSample: false });
        }, 2500);
      }
    }

    el("refreshButton").addEventListener("click", () => {
      loadDefaultDashboard({ fallbackToSample: false });
    });

    el("autoButton").addEventListener("click", () => {
      const enabled = el("autoButton").getAttribute("aria-pressed") !== "true";
      setAutoRefresh(enabled);
    });

    el("providerTransport").addEventListener("change", updateProviderChoices);

    el("providerCartridge").addEventListener("change", () => {
      const selected = el("providerCartridge").selectedOptions[0];
      el("providerModel").value = selected ? (selected.dataset.model || "") : "";
    });

    el("saveProviderKey").addEventListener("click", async () => {
      const envKey = el("providerSecretKey").value;
      const value = el("providerSecretValue").value;
      if (!envKey) {
        setProviderStatus("Selected transport does not need a key.");
        return;
      }
      if (!value) {
        setProviderStatus("Secret value is empty.");
        return;
      }
      setProviderStatus(`Saving ${envKey} locally...`);
      try {
        const response = await fetch("/api/provider-lab/save-secret", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ env_key: envKey, value })
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.error || "save failed");
        providerLabConfig.secret_status = result.secret_status;
        el("providerSecretValue").value = "";
        updateProviderChoices();
        setProviderStatus(`${envKey} saved to ${result.path}.`);
      } catch (error) {
        setProviderStatus(`Save failed: ${error.message}`);
      }
    });

    el("refreshProviderModels").addEventListener("click", async () => {
      const transport = selectedTransport();
      setProviderStatus(`Listing models for ${transport}...`);
      try {
        const response = await fetch("/api/provider-lab/list-models", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ transport })
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.error || "list failed");
        const staticCartridge = el("providerCartridge").options[0]?.value || transport;
        const existing = new Set(Array.from(el("providerCartridge").options).map((option) => option.dataset.model || option.textContent));
        const dynamic = (result.models || []).filter((model) => model.id && !existing.has(model.id));
        if (dynamic.length) {
          el("providerCartridge").insertAdjacentHTML(
            "beforeend",
            dynamic.map((model) => `<option value="${escapeHtml(staticCartridge)}" data-model="${escapeHtml(model.id)}">${escapeHtml(model.id)} (${escapeHtml(model.source || "provider")})</option>`).join("")
          );
        }
        const note = result.dynamic && result.dynamic.ok
          ? `${result.models.length} model(s) available.`
          : `Static cartridges loaded; live list blocked: ${result.dynamic?.reason || "unknown"}.`;
        setProviderStatus(note);
      } catch (error) {
        setProviderStatus(`List failed: ${error.message}`);
      }
    });

    el("testProviderNow").addEventListener("click", async () => {
      const cartridge = el("providerCartridge").value;
      const model = el("providerModel").value;
      const capability = el("providerCapability").value;
      setProviderStatus(`Testing ${cartridge}...`);
      try {
        const response = await fetch("/api/provider-lab/test", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cartridge, model, capability, profile: "builder" })
        });
        const result = await response.json();
        const adapterResult = result.result || {};
        const summary = adapterResult.summary || adapterResult.blocked_reason || result.stderr || "no summary";
        setProviderStatus(`${result.ok ? "PASS" : "BLOCKED"} ${cartridge}: ${summary}`);
      } catch (error) {
        setProviderStatus(`Test failed: ${error.message}`);
      }
    });

    el("questForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        title: el("questTitle").value,
        request: el("questRequest").value,
        quest_chain_id: el("questId").value || questIdFromTitle(el("questTitle").value),
        allowed_files: el("questAllowed").value,
        adapter: el("questAdapter").value
      };
      el("questId").value = payload.quest_chain_id;
      const providerNote = payload.adapter === "local-dry-run"
        ? "Using local-dry-run so the demo stays deterministic."
        : `Using provider adapter ${payload.adapter}; credentials/model quirks may block the run.`;
      logHermes([
        "Sending prompt to Hermes S-rank manager.",
        "Waiting for Hermes to create a bounded worker plan.",
        "Posting Hermes-derived tasks to blackboard...",
        providerNote,
        "Waking workers automatically after board update..."
      ]);
      try {
        const response = await fetch("/api/hermes/quest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const value = await response.json();
        if (!value.ok) throw new Error(value.error || "quest creation failed");
        activeQuestChainId = value.quest_chain_id;
        el("questId").value = value.quest_chain_id;
        const wakeResponse = await fetch("/api/wake", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            quest_chain_id: value.quest_chain_id,
            adapter: el("questAdapter").value,
            profiles: value.wake_profiles || [],
            interval_seconds: 2
          })
        });
        const wakeValue = await wakeResponse.json();
        if (!wakeValue.ok) throw new Error(wakeValue.error || "wake failed");
        const launched = wakeValue.launched.map((item) => `${item.profile}:${item.ok ? "launched" : "failed"}`);
        const adapterPlan = wakeValue.launched.map((item) => `${item.profile}=${item.adapter || payload.adapter}`);
        logHermes([
          ...value.events,
          `Router mode: ${value.router_mode || "manual-router-v0"}`,
          `Provider mode: ${value.provider_mode || payload.adapter}`,
          `Quest chain: ${value.quest_chain_id}`,
          `Created ${value.tasks.length} tasks and refreshed dashboard.`,
          `Worker adapters: ${adapterPlan.join(" / ")}`,
          `Workers: ${launched.join(" / ")}`
        ]);
        render(wakeValue.dashboard || value.dashboard);
        setAutoRefresh(true);
      } catch (error) {
        logHermes([`Failed to assign task: ${error.message}`]);
      }
    });

    loadProviderLab();
    loadDefaultDashboard();
  </script>
</body>
</html>
